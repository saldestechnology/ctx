version: 2
updates:
  - package-ecosystem: cargo
    directory: "/"
    schedule:
      interval: weekly
      day: monday
    groups:
      rust-runtime:
        dependency-type: production
      rust-development:
        dependency-type: development

  - package-ecosystem: cargo
    directory: "/perf"
    schedule:
      interval: weekly
      day: monday
    groups:
      perf-harness:
        patterns: ["*"]

  - package-ecosystem: github-actions
    directory: "/"
    schedule:
      interval: weekly
      day: monday
    groups:
      github-actions:
        patterns: ["*"]

  - package-ecosystem: npm
    directory: "/docs/website"
    schedule:
      interval: weekly
      day: monday
    groups:
      documentation-site:
        patterns: ["*"]
