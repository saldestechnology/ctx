name: CI

on:
  push:
    branches: [main]
    paths-ignore:
      - 'docs/**'
      - '**/*.md'
  # No paths-ignore here: a workflow skipped by a path filter never reports its
  # checks, so any of them that branch protection requires would stay pending
  # forever and block the pull request. Docs-only runs are skipped per job via
  # `needs.changes.outputs.code` instead -- a job skipped by `if:` does report,
  # and counts as success.
  pull_request:
    branches: [main]
  # Nightly perf run (full suite) and manual triggers (e.g. baseline capture
  # runs). Schedule/dispatch events are unaffected by the paths-ignore above.
  schedule:
    - cron: "17 3 * * *"
  workflow_dispatch:

env:
  CARGO_TERM_COLOR: always

permissions:
  contents: read

jobs:
  # Replaces the workflow-level paths-ignore: report whether the pull request
  # touches anything but docs, so the expensive jobs can skip a docs-only change
  # while still reporting a status that branch protection accepts.
  changes:
    name: detect code changes
    runs-on: ubuntu-latest
    outputs:
      code: ${{ steps.filter.outputs.code }}
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          fetch-depth: 0
          persist-credentials: false
      - id: filter
        env:
          BASE_SHA: ${{ github.event.pull_request.base.sha }}
        run: |
          if [ "${{ github.event_name }}" != "pull_request" ]; then
            echo "code=true" >> "$GITHUB_OUTPUT"
            exit 0
          fi
          if git diff --name-only "$BASE_SHA...HEAD" | grep -qvE '^docs/|\.md$'; then
            echo "code=true" >> "$GITHUB_OUTPUT"
          else
            echo "code=false" >> "$GITHUB_OUTPUT"
          fi

  test:
    needs: changes
    if: needs.changes.outputs.code == 'true'
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          # all-features covers the mcp feature (DuckDB compiles on Linux/macOS)
          - os: ubuntu-latest
            features: "--all-features"
          - os: macos-latest
            features: ""
          - os: windows-latest
            features: "--no-default-features"

    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@fa04a1451ff1842e2626ccb99004d0195b455a88
        with:
          toolchain: "1.91"

      - name: Cache cargo
        uses: actions/cache@55cc8345863c7cc4c66a329aec7e433d2d1c52a9 # v6.1.0
        with:
          path: |
            ~/.cargo/bin/
            ~/.cargo/registry/index/
            ~/.cargo/registry/cache/
            ~/.cargo/git/db/
            target/
          # ImageVersion is set by hosted runners; keying on it prevents a
          # target/ dir cached under one runner image (Xcode/clang paths)
          # from poisoning builds on a newer image
          key: ${{ runner.os }}-${{ env.ImageVersion }}-cargo-${{ hashFiles('**/Cargo.lock') }}

      - name: Build
        run: cargo build --locked --verbose ${{ matrix.features }}

      - name: Run tests
        run: cargo test --locked --verbose ${{ matrix.features }}

  lint:
    needs: changes
    if: needs.changes.outputs.code == 'true'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@fa04a1451ff1842e2626ccb99004d0195b455a88
        with:
          toolchain: "1.91"
          components: rustfmt, clippy

      - name: Check formatting
        run: cargo fmt --all -- --check

      - name: Clippy
        run: cargo clippy --locked --all-targets --all-features -- -D warnings

      - name: Test PR report renderer
        run: node --test .github/scripts/render-ctx-pr-comment.test.cjs

  plugins:
    needs: changes
    if: needs.changes.outputs.code == 'true'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@fa04a1451ff1842e2626ccb99004d0195b455a88
        with:
          toolchain: "1.91"

      - name: Verify generated and committed plugins match
        run: ./scripts/release-plugin-check.sh --check

      - name: Install Claude Code
        run: npm install -g @anthropic-ai/claude-code@2.1.207

      - name: Validate Claude plugin
        run: claude plugin validate ./plugins/claude/ctx --strict

      - name: Install Codex
        run: npm install -g @openai/codex@0.144.3

      - name: Validate Codex marketplace and install
        env:
          CODEX_HOME: ${{ runner.temp }}/codex-home
        run: |
          mkdir -p "$CODEX_HOME"
          codex plugin marketplace add ./plugins/codex/ctx --json
          codex plugin add ctx@ctx-local --json

  publish-dry-run:
    needs: changes
    if: needs.changes.outputs.code == 'true'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@fa04a1451ff1842e2626ccb99004d0195b455a88
        with:
          toolchain: "1.91"

      - name: Dry-run publish (with features)
        run: cargo publish --locked --dry-run

      - name: Dry-run publish (minimal)
        run: cargo publish --locked --dry-run --no-default-features

  packaging-metadata:
    needs: changes
    if: needs.changes.outputs.code == 'true'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false

      - name: Validate generated package-manager files
        run: |
          python3 scripts/update-package-metadata.py \
            0.3.3 packaging/SHA256SUMS.v0.3.3 --check
          python3 -m py_compile \
            scripts/package-release.py \
            scripts/update-package-metadata.py \
            scripts/validate-release-assets.py
          bash -n \
            scripts/package-linux.sh \
            scripts/update-aur-package.sh \
            scripts/update-homebrew-formula.sh
          ruby -c packaging/homebrew/ctx.rb
          python3 -m json.tool packaging/scoop/ctx.json >/dev/null

  perf:
    needs: changes
    if: needs.changes.outputs.code == 'true'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          # ctx score/check diff against git history; the harness also
          # records the commit SHA in its results.
          fetch-depth: 0
          persist-credentials: false

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@fa04a1451ff1842e2626ccb99004d0195b455a88
        with:
          toolchain: "1.91"

      - name: Cache cargo
        uses: actions/cache@55cc8345863c7cc4c66a329aec7e433d2d1c52a9 # v6.1.0
        with:
          path: |
            ~/.cargo/bin/
            ~/.cargo/registry/index/
            ~/.cargo/registry/cache/
            ~/.cargo/git/db/
            target/
            perf/target/
          # ImageVersion is set by hosted runners; keying on it prevents a
          # target/ dir cached under one runner image (Xcode/clang paths)
          # from poisoning builds on a newer image
          key: ${{ runner.os }}-${{ env.ImageVersion }}-cargo-perf-${{ hashFiles('**/Cargo.lock') }}

      - name: Build ctx (perf profile, all features)
        run: cargo build --locked --profile perf --all-features

      - name: Harness unit tests
        run: cargo test --locked --manifest-path perf/Cargo.toml

      - name: Harness smoke run
        env:
          CTX_PERF_BIN: ${{ github.workspace }}/target/perf/ctx
        run: cargo run --locked --release --manifest-path perf/Cargo.toml -- --smoke

      # Advisory period: continue-on-error until the ubuntu-latest baseline
      # lands in perf/baselines/ and run-to-run spread is confirmed <20%.
      # Flip this to required (remove continue-on-error) at that point.
      - name: Run perf harness
        continue-on-error: true
        env:
          CTX_PERF_BIN: ${{ github.workspace }}/target/perf/ctx
          CTX_PERF_BUDGET_SCALE: "1.5"
        run: |
          SUITE=pr
          if [ "${{ github.event_name }}" = "schedule" ] || \
             [ "${{ github.event_name }}" = "workflow_dispatch" ] || \
             { [ "${{ github.event_name }}" = "push" ] && [ "${{ github.ref }}" = "refs/heads/main" ]; }; then
            SUITE=full
          fi
          cargo run --locked --release --manifest-path perf/Cargo.toml -- \
            --suite "$SUITE" \
            --baseline perf/baselines/ubuntu-latest.json \
            --json-out perf-results.json

      - name: Upload perf results
        if: always()
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: perf-results
          path: perf-results.json
          if-no-files-found: ignore
