name: Release

on:
  push:
    tags: ["v*"]

env:
  CARGO_TERM_COLOR: always

permissions: {}

concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: false

jobs:
  release-gates:
    name: release gates
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          fetch-depth: 0
          persist-credentials: false

      - name: Require an annotated tag on reviewed main history
        shell: bash
        run: |
          set -euo pipefail
          # checkout resolves an annotated tag to GITHUB_SHA and updates the
          # local tag ref to that commit. Restore the remote tag object before
          # checking its type and peeled commit.
          git fetch --force --no-tags origin \
            "refs/tags/${GITHUB_REF_NAME}:refs/tags/${GITHUB_REF_NAME}"
          git fetch --no-tags origin main:refs/remotes/origin/main
          test "$(git cat-file -t "refs/tags/${GITHUB_REF_NAME}")" = tag
          tagged_commit="$(git rev-parse "refs/tags/${GITHUB_REF_NAME}^{commit}")"
          test "$tagged_commit" = "$GITHUB_SHA"
          git merge-base --is-ancestor "$tagged_commit" origin/main

      - uses: dtolnay/rust-toolchain@fa04a1451ff1842e2626ccb99004d0195b455a88
        with:
          toolchain: "1.91"
          components: rustfmt, clippy

      - name: Run deterministic release checks
        run: scripts/release-check.sh "${GITHUB_REF_NAME}"

      - name: Check dependency, license, advisory, and source policy
        uses: EmbarkStudios/cargo-deny-action@3c6349835b2b7b196a839186cb8b78e02f7b5f25 # v2.1.1
        with:
          command: check
          arguments: --all-features

      - name: Check published Rust API compatibility
        uses: obi1kenobi/cargo-semver-checks-action@6b69fcf40e9b5fb17adeb57e4b6ecd020649a239 # v2.9
        with:
          package: agentis-ctx
          feature-group: all-features
          rust-toolchain: "1.91"

      - name: Upload reviewed release notes
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: release-notes
          path: release-notes.md
          if-no-files-found: error

  build:
    needs: release-gates
    runs-on: ${{ matrix.os }}
    permissions:
      contents: read
    strategy:
      fail-fast: false
      matrix:
        include:
          # Pin the oldest available hosted Linux image to avoid unnecessarily
          # raising the released binary's glibc floor on runner image updates.
          - os: ubuntu-22.04
            target: x86_64-unknown-linux-gnu
            features: ""
          - os: macos-15-intel
            target: x86_64-apple-darwin
            # ort-sys does not publish ONNX Runtime binaries for Intel macOS.
            features: "--no-default-features"
          - os: macos-latest
            target: aarch64-apple-darwin
            features: ""
          - os: windows-latest
            target: x86_64-pc-windows-msvc
            features: "--no-default-features"

    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false

      - uses: dtolnay/rust-toolchain@fa04a1451ff1842e2626ccb99004d0195b455a88
        with:
          toolchain: "1.91"
          targets: ${{ matrix.target }}

      - name: Build release
        run: cargo build --locked --release --target ${{ matrix.target }} ${{ matrix.features }}

      - name: Package and checksum (Unix)
        if: runner.os != 'Windows'
        run: |
          python3 scripts/package-release.py \
             "${GITHUB_REF_NAME#v}" \
             "${{ matrix.target }}" \
             "target/${{ matrix.target }}/release/ctx" \
             .
          archive="ctx-${GITHUB_REF_NAME}-${{ matrix.target }}.tar.gz"
          shasum -a 256 "$archive" > "$archive.sha256"

      - name: Package and checksum (Windows)
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          python scripts/package-release.py `
             "$($env:GITHUB_REF_NAME.TrimStart('v'))" `
             "${{ matrix.target }}" `
             "target/${{ matrix.target }}/release/ctx.exe" `
             .
          $archive = "ctx-$env:GITHUB_REF_NAME-${{ matrix.target }}.zip"
          $hash = (Get-FileHash $archive -Algorithm SHA256).Hash.ToLower()
          [IO.File]::WriteAllText("$archive.sha256", "$hash  $archive`n", [Text.Encoding]::ASCII)

      - uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: ctx-${{ matrix.target }}
          path: |
            ctx-v*.tar.gz*
            ctx-v*.zip*
          if-no-files-found: error

  linux-packages:
    needs: [release-gates, build]
    runs-on: ubuntu-22.04
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false

      - name: Download Linux GNU release archive
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        with:
          name: ctx-x86_64-unknown-linux-gnu
          path: dist

      - name: Install native package tools
        run: |
          sudo apt-get update
          sudo apt-get install --yes cpio rpm

      - name: Build and validate Debian and RPM packages
        run: |
          ./scripts/package-linux.sh \
            "${GITHUB_REF_NAME#v}" \
            "dist/ctx-${GITHUB_REF_NAME}-x86_64-unknown-linux-gnu.tar.gz" \
            dist
          (
            cd dist
            sha256sum \
              "ctx_${GITHUB_REF_NAME#v}_amd64.deb" \
              "ctx-${GITHUB_REF_NAME#v}-1.x86_64.rpm" \
              > native-packages.sha256
          )

      - name: Optional package lint
        run: |
          if command -v lintian >/dev/null; then
            lintian "dist/ctx_${GITHUB_REF_NAME#v}_amd64.deb"
          else
            echo "lintian is unavailable; dpkg-deb structural validation completed"
          fi
          if command -v rpmlint >/dev/null; then
            rpmlint "dist/ctx-${GITHUB_REF_NAME#v}-1.x86_64.rpm"
          else
            echo "rpmlint is unavailable; rpm metadata/content validation completed"
          fi

      - name: Test packaged executables
        run: |
          sudo apt-get install --yes "./dist/ctx_${GITHUB_REF_NAME#v}_amd64.deb"
          ctx --version
          ctx --help >/dev/null
          mkdir rpm-root
          cd rpm-root
          rpm2cpio "../dist/ctx-${GITHUB_REF_NAME#v}-1.x86_64.rpm" | cpio -idmu
          ./usr/bin/ctx --version
          ./usr/bin/ctx --help >/dev/null

      - name: Upload native package artifacts
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: ctx-linux-packages
          path: |
            dist/*.deb
            dist/*.rpm
            dist/native-packages.sha256
          if-no-files-found: error

  # Plugin/binary version lockstep: both release ZIPs are packaged from the
  # committed canonical trees, after comparing them byte-for-byte with fresh
  # `ctx harness init --mode plugin` output.
  plugin:
    needs: release-gates
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false
      - uses: dtolnay/rust-toolchain@fa04a1451ff1842e2626ccb99004d0195b455a88
        with:
          toolchain: "1.91"
      - name: Verify plugin/binary lockstep and package plugins
        run: |
          scripts/release-plugin-check.sh "${GITHUB_REF_NAME#v}"
          sha256sum ctx-*-plugin-*.zip > plugin-SHA256SUMS
      - uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: ctx-agent-plugins
          path: |
            ctx-claude-plugin-*.zip
            ctx-codex-plugin-*.zip
            plugin-SHA256SUMS
          if-no-files-found: error

  assemble-assets:
    name: validate and assemble release assets
    needs: [release-gates, build, plugin, linux-packages]
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false

      - uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        with:
          path: downloaded

      - name: Verify producers and assemble the exact release payload
        shell: bash
        run: |
          set -euo pipefail
          mkdir dist
          version="${GITHUB_REF_NAME#v}"
          expected=(
            "ctx-${GITHUB_REF_NAME}-x86_64-unknown-linux-gnu.tar.gz"
            "ctx-${GITHUB_REF_NAME}-x86_64-apple-darwin.tar.gz"
            "ctx-${GITHUB_REF_NAME}-aarch64-apple-darwin.tar.gz"
            "ctx-${GITHUB_REF_NAME}-x86_64-pc-windows-msvc.zip"
            "ctx-claude-plugin-${version}.zip"
            "ctx-codex-plugin-${version}.zip"
            "ctx_${version}_amd64.deb"
            "ctx-${version}-1.x86_64.rpm"
          )
          while IFS= read -r checksum; do
            (cd "$(dirname "$checksum")" && sha256sum -c "$(basename "$checksum")")
          done < <(find downloaded -type f -name '*.sha256' | LC_ALL=C sort)
          (cd downloaded/ctx-agent-plugins && sha256sum -c plugin-SHA256SUMS)
          for artifact in "${expected[@]}"; do
            mapfile -t matches < <(find downloaded -type f -name "$artifact")
            test "${#matches[@]}" -eq 1
            cp "${matches[0]}" "dist/$artifact"
          done
          find downloaded -type f -name '*.sha256' -exec cp {} dist/ \;
          cp downloaded/ctx-agent-plugins/plugin-SHA256SUMS dist/
          (
            cd dist
            find . -maxdepth 1 -type f -printf '%f\n' \
              | LC_ALL=C sort \
              | xargs sha256sum > SHA256SUMS
          )

      - name: Validate archives, checksums, and package-manager definitions
        run: |
          python3 scripts/validate-release-assets.py \
            "${GITHUB_REF_NAME#v}" dist --complete
          python3 scripts/update-package-metadata.py \
            "${GITHUB_REF_NAME#v}" dist/SHA256SUMS
          python3 scripts/update-package-metadata.py \
            "${GITHUB_REF_NAME#v}" dist/SHA256SUMS --check

      - name: Upload immutable release payload
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: release-payload
          path: dist/
          if-no-files-found: error

      - name: Upload generated package-manager definitions
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: ctx-package-manager-definitions
          path: |
            packaging/homebrew/ctx.rb
            packaging/aur/PKGBUILD
            packaging/aur/.SRCINFO
            packaging/scoop/ctx.json
          include-hidden-files: true
          if-no-files-found: error

  publish:
    name: publish crate
    needs: [release-gates, assemble-assets]
    runs-on: ubuntu-latest
    environment: release
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false
      - uses: dtolnay/rust-toolchain@fa04a1451ff1842e2626ccb99004d0195b455a88
        with:
          toolchain: "1.91"
      - name: Publish agentis-ctx
        run: cargo publish --locked
        env:
          CARGO_REGISTRY_TOKEN: ${{ secrets.CARGO_REGISTRY_TOKEN }}

  github-release:
    name: publish GitHub Release and provenance
    needs: [assemble-assets, publish]
    runs-on: ubuntu-latest
    permissions:
      contents: write
      id-token: write
      attestations: write
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false

      - name: Download validated release payload
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        with:
          name: release-payload
          path: dist

      - name: Download reviewed release notes
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        with:
          name: release-notes
          path: reviewed-notes

      - name: Attest release artifact provenance
        uses: actions/attest-build-provenance@0f67c3f4856b2e3261c31976d6725780e5e4c373 # v4.1.1
        with:
          subject-checksums: dist/SHA256SUMS

      - name: Create GitHub Release from reviewed changelog notes
        uses: softprops/action-gh-release@3d0d9888cb7fd7b750713d6e236d1fcb99157228 # v3.0.2
        with:
          body_path: reviewed-notes/release-notes.md
          files: |
            dist/*
          fail_on_unmatched_files: true
          generate_release_notes: false
