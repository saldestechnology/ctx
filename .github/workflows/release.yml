name: Release

on:
  push:
    tags: ["v*"]

env:
  CARGO_TERM_COLOR: always

permissions:
  contents: write

jobs:
  check-version:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Verify tag matches Cargo.toml version
        run: |
          CARGO_VERSION=$(cargo metadata --no-deps --format-version 1 | jq -r '.packages[0].version')
          TAG_VERSION="${GITHUB_REF_NAME#v}"
          if [ "$CARGO_VERSION" != "$TAG_VERSION" ]; then
            echo "Tag $TAG_VERSION does not match Cargo.toml version $CARGO_VERSION"
            exit 1
          fi

  test:
    needs: check-version
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Run tests
        run: cargo test --verbose

  build:
    needs: [check-version, test]
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          # Pin the oldest available hosted Linux image to avoid unnecessarily
          # raising the released binary's glibc floor on runner image updates.
          - os: ubuntu-22.04
            target: x86_64-unknown-linux-gnu
            features: ""
          # macos-latest runners are arm64; use the Intel runner for x86_64
          # so the bundled DuckDB C++ compiles natively
          - os: macos-15-intel
            target: x86_64-apple-darwin
            features: ""
          - os: macos-latest
            target: aarch64-apple-darwin
            features: ""
          # DuckDB does not compile on Windows MSVC
          - os: windows-latest
            target: x86_64-pc-windows-msvc
            features: "--no-default-features"

    steps:
      - uses: actions/checkout@v4

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Build release
        run: cargo build --release --target ${{ matrix.target }} ${{ matrix.features }}

      - name: Package (unix)
        if: runner.os != 'Windows'
        run: |
          python3 scripts/package-release.py \
            "${GITHUB_REF_NAME#v}" \
            "${{ matrix.target }}" \
            "target/${{ matrix.target }}/release/ctx" \
            .

      - name: Package (windows)
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          python scripts/package-release.py `
            "$($env:GITHUB_REF_NAME.TrimStart('v'))" `
            "${{ matrix.target }}" `
            "target/${{ matrix.target }}/release/ctx.exe" `
            .

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: ctx-${{ matrix.target }}
          path: |
            ctx-v*.tar.gz
            ctx-v*.zip

  linux-packages:
    needs: build
    runs-on: ubuntu-22.04
    steps:
      - uses: actions/checkout@v4

      - name: Download Linux GNU release archive
        uses: actions/download-artifact@v4
        with:
          name: ctx-x86_64-unknown-linux-gnu
          path: dist

      - name: Install native package tools
        run: |
          sudo apt-get update
          sudo apt-get install --yes rpm

      - name: Build and validate Debian and RPM packages
        run: |
          ./scripts/package-linux.sh \
            "${GITHUB_REF_NAME#v}" \
            "dist/ctx-${GITHUB_REF_NAME}-x86_64-unknown-linux-gnu.tar.gz" \
            dist

      - name: Optional package lint
        run: |
          if command -v lintian >/dev/null; then
            lintian "dist/ctx_${GITHUB_REF_NAME#v}_amd64.deb"
          else
            echo "lintian is unavailable; dpkg-deb structural validation completed"
          fi
          if command -v rpmlint >/dev/null; then
            rpmlint "dist/ctx-${GITHUB_REF_NAME#v}-1.x86_64.rpm"
          else
            echo "rpmlint is unavailable; rpm metadata/content validation completed"
          fi

      - name: Upload native package artifacts
        uses: actions/upload-artifact@v4
        with:
          name: ctx-linux-packages
          path: |
            dist/*.deb
            dist/*.rpm

  # Plugin/binary version lockstep: plugin.json is generated from the crate
  # version by `ctx harness init --mode plugin`, so both target plugins match the tag by
  # construction -- this job asserts that (failing the release otherwise)
  # and packages the plugin scaffold as a release artifact.
  plugin:
    needs: [check-version, test]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Verify plugin version lockstep and package plugin
        run: ./scripts/release-plugin-check.sh "${GITHUB_REF_NAME#v}"

      - name: Upload plugin artifacts
        uses: actions/upload-artifact@v4
        with:
          name: ctx-agent-plugins
          path: |
            ctx-claude-plugin-*.zip
            ctx-codex-plugin-*.zip

  github-release:
    needs: [build, plugin, linux-packages]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Download artifacts
        uses: actions/download-artifact@v4
        with:
          path: dist
          merge-multiple: true

      # One aggregated SHA256SUMS over every artifact (consumed by
      # `ctx self-update` for download verification); the per-artifact
      # .sha256 files are kept for manual spot checks.
      - name: Aggregate SHA256SUMS
        run: |
          cd dist
          find . -maxdepth 1 -type f ! -name SHA256SUMS -printf '%f\n' \
            | LC_ALL=C sort \
            | xargs sha256sum > SHA256SUMS
          cat SHA256SUMS

      - name: Validate release assets
        run: python3 scripts/validate-release-assets.py "${GITHUB_REF_NAME#v}" dist --complete

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: dist/*
          generate_release_notes: true

  publish:
    needs: build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Verify both feature combos package cleanly
        run: |
          cargo publish --dry-run
          cargo publish --dry-run --no-default-features

      - name: Publish to crates.io
        run: cargo publish
        env:
          CARGO_REGISTRY_TOKEN: ${{ secrets.CARGO_REGISTRY_TOKEN }}
