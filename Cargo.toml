[package]
name = "ctx"
version = "0.1.0"
edition = "2021"
description = "Fast CLI tool to generate AI-ready context from your codebase"
license = "MIT"
repository = "https://github.com/yourusername/context"
homepage = "https://github.com/yourusername/context"
readme = "README.md"
keywords = ["cli", "llm", "ai", "context", "prompt"]
categories = ["command-line-utilities", "development-tools"]
authors = ["Johan Öhman Saldes <johan@itkonsult.net>"]
exclude = [".github/"]

[[bin]]
name = "ctx"
path = "src/main.rs"

[dependencies]
clap = { version = "4", features = ["derive"] }
ignore = "0.4"
globset = "0.4"

# Code Intelligence (Phase 1: SQLite Foundation)
rusqlite = { version = "0.31", features = ["bundled"] }
sha2 = "0.10"
flate2 = "1.0"                    # For source compression

# Tree-sitter for code parsing
tree-sitter = "0.20"
tree-sitter-rust = "0.20"
tree-sitter-typescript = "0.20"
tree-sitter-javascript = "0.20"
tree-sitter-python = "0.20"
tree-sitter-go = "0.20"
tree-sitter-solidity = "1.2"

# Serialization
serde = { version = "1.0", features = ["derive"] }
serde_json = "1.0"

# Error handling
thiserror = "1.0"

# Phase 2: DuckDB for analytical queries
duckdb = { version = "1.0", features = ["bundled"] }

# Phase 4: File watching for incremental updates
notify = "6.1"
notify-debouncer-mini = "0.4"

[dev-dependencies]
tempfile = "3"

[profile.release]
lto = true
strip = true
codegen-units = 1
