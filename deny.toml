[graph]
all-features = true
exclude-dev = false

[advisories]
version = 2
yanked = "deny"
ignore = [
  # Transitive through fastembed/image; no maintained replacement is selectable.
  # Reassess with the next fastembed update, no later than 2026-09-30.
  "RUSTSEC-2024-0436",
  # ring's affected QUIC/large single-buffer AES paths are not used by ctx. A
  # fixed ring currently conflicts with the tree-sitter 0.20 cc constraint.
  # Remove after the parser stack moves, no later than 2026-09-30.
  "RUSTSEC-2025-0009",
  # ctx enables rmcp's stdio transport only; the vulnerable Streamable HTTP
  # server transport is neither enabled nor exposed. Upgrade rmcp by 2026-09-30.
  "RUSTSEC-2026-0189",
  # number_prefix is unmaintained but has no reported vulnerability; it is
  # transitive through the Intel-compatible fastembed line. Remove when Intel
  # macOS can move to a maintained ORT distribution, no later than 2026-09-30.
  "RUSTSEC-2025-0119",
]

[licenses]
version = 2
confidence-threshold = 0.66
unused-allowed-license = "warn"
allow = [
  "Apache-2.0",
  "Apache-2.0 WITH LLVM-exception",
  "BSD-2-Clause",
  "BSD-3-Clause",
  "BSL-1.0",
  "CC0-1.0",
  "CDLA-Permissive-2.0",
  "ISC",
  "MIT",
  "MIT-0",
  "MPL-2.0",
  "NCSA",
  "OpenSSL",
  "Unicode-3.0",
  "Unlicense",
  "Zlib",
]

[bans]
multiple-versions = "warn"
wildcards = "deny"
# Internal path dependencies are tied to the checked-out source tree. Keep
# registry wildcard versions denied without duplicating the ctx package version.
allow-wildcard-paths = true
highlight = "all"
deny = []
skip = []
skip-tree = []

[sources]
unknown-registry = "deny"
unknown-git = "deny"
allow-registry = ["https://github.com/rust-lang/crates.io-index"]
allow-git = []
